<ng-container *transloco="let t; read: translationTemplate">
    <div class="bg-secondary">
        <p class="ms-3 mat-title-large on-primary-color">{{ t("EDIT_SESSION_TITLE") }}</p>
    </div>

    <mat-dialog-content class="bg-on-primary pt-3">
        <form>
            <div class="row gx-3 gy-2">

                <!-- Session type -->
                <brdgs-select
                    class="col-12"
                    [label]="t('SELECT_SESSION')"
                    [isRequired]="true"
                    [options]="sessionOptions()"
                    [(value)]="sessionId">
                </brdgs-select>

                <!-- Date -->
                <brdgs-date-picker
                    class="col-12"
                    [label]="t('START_DATE')"
                    [datePickerMin]="today.toISOString()"
                    [(value)]="scheduledDate"
                    [isRequired]="true">
                </brdgs-date-picker>

                <!-- Start / End time -->
                <brdgs-time-picker
                    class="col-6"
                    [label]="t('START_TIME')"
                    [(value)]="startTime"
                    [isRequired]="true"
                    [timepickerMax]="'23:00'"
                    (valueChange)="updateEndTime($event)">
                </brdgs-time-picker>

                <brdgs-time-picker
                    class="col-6"
                    [label]="t('END_TIME')"
                    [(value)]="endTime"
                    [isRequired]="true">
                </brdgs-time-picker>

                <!-- Coaches -->
                <app-select-staff class="col-12" [(staffId)]="staffId" [role]="'Coach'" [isMultiple]="true"
                    [isRequired]="false" [label]="t('SELECT_COACH')"
                    [translationTemplate]="translationTemplate"></app-select-staff>

                <!-- Spots capacity -->
                <div class="col-12 mt-1">
                    <mat-slide-toggle [checked]="limitSpots()"
                        (change)="limitSpots.set($event.checked); maxSpots.set(null)">
                        {{ t("LIMIT_SPOTS") }}
                    </mat-slide-toggle>
                    @if (limitSpots()) {
                    <div class="mt-2" style="max-width: 180px;">
                        <brdgs-input
                            [label]="t('MAX_SPOTS')"
                            [type]="'number'"
                            [isRequired]="true"
                            [min]="bookedCount || 1"
                            [(value)]="maxSpots">
                        </brdgs-input>
                        @if (isBelowBooked) {
                        <small class="text-danger">
                            Minimum {{ bookedCount }} — {{ bookedCount === 1 ? '1 member has' : bookedCount + ' members have' }} already booked
                        </small>
                        }
                    </div>
                    }
                </div>

            </div>
        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-stroked-button color="primary" matDialogClose>
            {{ t("CANCEL") }}
        </button>
        <button mat-flat-button color="primary"
            [disabled]="loading() || !sessionId() || !scheduledDate() || !startTime() || !endTime() || (limitSpots() && !maxSpots()) || isBelowBooked"
            (click)="save()">
            {{ t("SAVE") }}
        </button>
    </mat-dialog-actions>
</ng-container>
